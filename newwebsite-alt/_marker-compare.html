<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Marker Compare — 神戸リボン（建物アイコン）</title>
<style>
  body { font-family: "Noto Sans JP", "Yu Gothic", sans-serif; background: #f8f8f6; margin: 20px; color: #25272d; }
  h1 { font-size: 18px; margin: 0 0 6px; }
  .lead { font-size: 12px; color: #6d7370; margin: 0 0 18px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 22px; max-width: 1100px; }
  @media (min-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
  .card h2 { font-size: 14px; margin: 0; padding: 10px 14px; background: #fafafa; border-bottom: 1px solid #eee; }
  .card h2 small { font-weight: 400; color: #6d7370; font-size: 11px; display: block; margin-top: 2px; }
  .map { width: 100%; aspect-ratio: 1.3 / 1; background: #f0f0f0; }
</style>
</head>
<body>

<h1>建物アイコン付きマーカー比較 — 神戸リボン店舗</h1>
<p class="lead">案 C'（ピル + 「神戸リボン」テキスト）+ 下部に建物アイコン。座標 34.7122337, 135.5928885 / zoom 16 / X Spot Location スタイル</p>

<div class="grid">
  <div class="card">
    <h2>案 1：ストアフロント <small>オーニング（日除け）付きの商店ファサード</small></h2>
    <div class="map" id="map-storefront"></div>
  </div>
  <div class="card">
    <h2>案 2：シンプル家形 <small>三角屋根 + 本体 + ドアの最小構成</small></h2>
    <div class="map" id="map-house"></div>
  </div>
  <div class="card">
    <h2>案 3：2F 建物 <small>2 階建てビル（実際の所在地：花き卸売市場 2F に対応）</small></h2>
    <div class="map" id="map-2f"></div>
  </div>
</div>

<script>
  const STYLE_X_SPOT = [{"featureType":"all","elementType":"all","stylers":[{"visibility":"on"}]},{"featureType":"administrative","elementType":"labels.text.fill","stylers":[{"color":"#444444"}]},{"featureType":"administrative.province","elementType":"all","stylers":[{"visibility":"off"}]},{"featureType":"administrative.locality","elementType":"all","stylers":[{"visibility":"off"}]},{"featureType":"administrative.neighborhood","elementType":"all","stylers":[{"visibility":"off"}]},{"featureType":"administrative.land_parcel","elementType":"all","stylers":[{"visibility":"off"}]},{"featureType":"administrative.land_parcel","elementType":"labels.text","stylers":[{"visibility":"off"}]},{"featureType":"landscape","elementType":"all","stylers":[{"color":"#f2f2f2"}]},{"featureType":"landscape.man_made","elementType":"all","stylers":[{"visibility":"simplified"}]},{"featureType":"poi","elementType":"all","stylers":[{"visibility":"off"},{"color":"#cee9de"},{"saturation":"2"},{"weight":"0.80"}]},{"featureType":"poi.attraction","elementType":"geometry.fill","stylers":[{"visibility":"off"}]},{"featureType":"poi.park","elementType":"all","stylers":[{"visibility":"on"}]},{"featureType":"road","elementType":"all","stylers":[{"saturation":-100},{"lightness":45}]},{"featureType":"road.highway","elementType":"all","stylers":[{"visibility":"simplified"}]},{"featureType":"road.highway","elementType":"geometry.fill","stylers":[{"visibility":"on"},{"color":"#f5d6d6"}]},{"featureType":"road.highway","elementType":"labels.text","stylers":[{"visibility":"off"}]},{"featureType":"road.highway","elementType":"labels.icon","stylers":[{"hue":"#ff0000"},{"visibility":"on"}]},{"featureType":"road.highway.controlled_access","elementType":"labels.text","stylers":[{"visibility":"simplified"}]},{"featureType":"road.highway.controlled_access","elementType":"labels.icon","stylers":[{"visibility":"on"},{"hue":"#0064ff"},{"gamma":"1.44"},{"lightness":"-3"},{"weight":"1.69"}]},{"featureType":"road.arterial","elementType":"all","stylers":[{"visibility":"on"}]},{"featureType":"road.arterial","elementType":"labels.text","stylers":[{"visibility":"off"}]},{"featureType":"road.arterial","elementType":"labels.icon","stylers":[{"visibility":"off"}]},{"featureType":"road.local","elementType":"all","stylers":[{"visibility":"on"}]},{"featureType":"road.local","elementType":"labels.text","stylers":[{"visibility":"simplified"},{"weight":"0.31"},{"gamma":"1.43"},{"lightness":"-5"},{"saturation":"-22"}]},{"featureType":"transit","elementType":"all","stylers":[{"visibility":"off"}]},{"featureType":"transit.line","elementType":"all","stylers":[{"visibility":"on"},{"hue":"#ff0000"}]},{"featureType":"transit.station.airport","elementType":"all","stylers":[{"visibility":"simplified"},{"hue":"#ff0045"}]},{"featureType":"transit.station.bus","elementType":"all","stylers":[{"visibility":"on"},{"hue":"#00d1ff"}]},{"featureType":"transit.station.bus","elementType":"labels.text","stylers":[{"visibility":"simplified"}]},{"featureType":"transit.station.rail","elementType":"all","stylers":[{"visibility":"simplified"},{"hue":"#00cbff"}]},{"featureType":"transit.station.rail","elementType":"labels.text","stylers":[{"visibility":"simplified"}]},{"featureType":"water","elementType":"all","stylers":[{"color":"#46bcec"},{"visibility":"on"}]},{"featureType":"water","elementType":"geometry.fill","stylers":[{"weight":"1.61"},{"color":"#cde2e5"},{"visibility":"on"}]}];

  const CENTER = { lat: 34.7122337, lng: 135.5928885 };

  const PILL = '<rect x="4" y="4" width="122" height="42" rx="21" fill="#ffffff" stroke="#cdf000" stroke-width="2.5"/><text x="65" y="30" text-anchor="middle" font-family="Noto Sans JP, Yu Gothic, sans-serif" font-weight="700" font-size="13.5" fill="#25272d">神戸リボン</text>';

  // 案 1: ストアフロント（オーニング付き）
  const SVG_STOREFRONT = '<svg xmlns="http://www.w3.org/2000/svg" width="130" height="115" viewBox="0 0 130 115">' + PILL +
    '<path d="M 44,68 L 86,68 L 82,58 L 48,58 Z" fill="#cdf000" stroke="#25272d" stroke-width="2" stroke-linejoin="round"/>' +
    '<line x1="55" y1="58" x2="55" y2="68" stroke="#25272d" stroke-width="1"/>' +
    '<line x1="65" y1="58" x2="65" y2="68" stroke="#25272d" stroke-width="1"/>' +
    '<line x1="75" y1="58" x2="75" y2="68" stroke="#25272d" stroke-width="1"/>' +
    '<rect x="48" y="68" width="34" height="42" fill="#ffffff" stroke="#25272d" stroke-width="2"/>' +
    '<rect x="60" y="88" width="10" height="22" fill="#25272d"/>' +
    '</svg>';

  // 案 2: シンプル家形
  const SVG_HOUSE = '<svg xmlns="http://www.w3.org/2000/svg" width="130" height="115" viewBox="0 0 130 115">' + PILL +
    '<polygon points="44,68 86,68 65,52" fill="#cdf000" stroke="#25272d" stroke-width="2" stroke-linejoin="round"/>' +
    '<rect x="48" y="68" width="34" height="42" fill="#ffffff" stroke="#25272d" stroke-width="2"/>' +
    '<rect x="60" y="86" width="10" height="24" fill="#25272d"/>' +
    '</svg>';

  // 案 3: 2F 建物
  const SVG_2F = '<svg xmlns="http://www.w3.org/2000/svg" width="130" height="115" viewBox="0 0 130 115">' + PILL +
    '<rect x="44" y="56" width="42" height="54" fill="#ffffff" stroke="#25272d" stroke-width="2"/>' +
    '<line x1="44" y1="83" x2="86" y2="83" stroke="#25272d" stroke-width="1.5"/>' +
    '<rect x="50" y="62" width="10" height="13" fill="#cdf000" stroke="#25272d" stroke-width="1.2"/>' +
    '<rect x="70" y="62" width="10" height="13" fill="#cdf000" stroke="#25272d" stroke-width="1.2"/>' +
    '<rect x="50" y="89" width="9" height="11" fill="#cdf000" stroke="#25272d" stroke-width="1.2"/>' +
    '<rect x="71" y="89" width="9" height="11" fill="#cdf000" stroke="#25272d" stroke-width="1.2"/>' +
    '<rect x="61" y="92" width="8" height="18" fill="#25272d"/>' +
    '</svg>';

  function svgDataUrl(svg) {
    return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  }

  function makeMap(elId, svg) {
    const map = new google.maps.Map(document.getElementById(elId), {
      center: CENTER, zoom: 16, styles: STYLE_X_SPOT,
      disableDefaultUI: true, gestureHandling: 'cooperative',
      backgroundColor: '#f0f0f0'
    });
    new google.maps.Marker({
      position: CENTER,
      map: map,
      icon: {
        url: svgDataUrl(svg),
        size: new google.maps.Size(130, 115),
        scaledSize: new google.maps.Size(130, 115),
        anchor: new google.maps.Point(65, 110)
      },
      title: '神戸リボン'
    });
  }

  function initCompare() {
    makeMap('map-storefront', SVG_STOREFRONT);
    makeMap('map-house', SVG_HOUSE);
    makeMap('map-2f', SVG_2F);
  }

  (function() {
    fetch('index.html').then(r => r.text()).then(html => {
      const m = html.match(/window\.KR_GOOGLE_MAPS_API_KEY\s*=\s*'([^']+)'/);
      if (!m) {
        const p = document.createElement('p');
        p.style.color = '#c00';
        p.textContent = 'API key not found in index.html';
        document.body.insertBefore(p, document.body.firstChild);
        return;
      }
      const s = document.createElement('script');
      s.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(m[1]) + '&callback=initCompare&loading=async&v=weekly';
      s.async = true; s.defer = true;
      document.head.appendChild(s);
    });
  })();
</script>

</body>
</html>
