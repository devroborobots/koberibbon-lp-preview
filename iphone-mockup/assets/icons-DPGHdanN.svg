<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <symbol id="i-back" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M15 5L8 12L15 19"/>
  </symbol>

  <symbol id="i-shield" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 2L4 5V11C4 16 7.5 20.5 12 22C16.5 20.5 20 16 20 11V5L12 2Z"/>
    <path d="M12 6L13.5 9.5L17 10L14.5 12.5L15 16L12 14.5L9 16L9.5 12.5L7 10L10.5 9.5L12 6Z" fill="#5BAA47"/>
  </symbol>

  <symbol id="i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="10.5" cy="10.5" r="6.5"/>
    <path d="M20 20L15.5 15.5"/>
  </symbol>

  <symbol id="i-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 4C5 3 6 2 7 2H9L11 7L8.5 8.5C9.5 11 12 13.5 14.5 14.5L16 12L21 14V16C21 17 20 18 19 18C11 18 5 12 5 4Z"/>
  </symbol>

  <symbol id="i-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
    <path d="M4 6H20"/>
    <path d="M4 12H20"/>
    <path d="M4 18H20"/>
  </symbol>

  <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M12 5V19"/>
    <path d="M5 12H19"/>
  </symbol>

  <symbol id="i-camera" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 8C4 7 5 6 6 6H8L9.5 4H14.5L16 6H18C19 6 20 7 20 8V17C20 18 19 19 18 19H6C5 19 4 18 4 17V8Z"/>
    <circle cx="12" cy="12.5" r="3.5"/>
  </symbol>

  <symbol id="i-image" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3.5" y="5" width="17" height="14" rx="2"/>
    <circle cx="8" cy="10" r="1.5"/>
    <path d="M4 17L9 12L13 16L16 13L20 17"/>
  </symbol>

  <symbol id="i-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="9" y="3" width="6" height="12" rx="3"/>
    <path d="M5 11C5 15 8 18 12 18C16 18 19 15 19 11"/>
    <path d="M12 18V21"/>
    <path d="M9 21H15"/>
  </symbol>

  <!-- iOS-style cellular signal: 4 bars increasing -->
  <symbol id="i-cellular" viewBox="0 0 24 24" fill="currentColor">
    <rect x="2" y="15" width="3.2" height="6" rx="0.6"/>
    <rect x="7.4" y="12" width="3.2" height="9" rx="0.6"/>
    <rect x="12.8" y="8" width="3.2" height="13" rx="0.6"/>
    <rect x="18.2" y="3" width="3.2" height="18" rx="0.6"/>
  </symbol>

  <!-- iOS-style WiFi: 3 stacked arcs + dot -->
  <symbol id="i-wifi" viewBox="0 0 24 24" fill="currentColor">
    <circle cx="12" cy="18.2" r="1.7"/>
    <path d="M8 14.6C9.1 13.6 10.5 13 12 13C13.5 13 14.9 13.6 16 14.6L14 16.6C13.4 16.1 12.7 15.8 12 15.8C11.3 15.8 10.6 16.1 10 16.6Z"/>
    <path d="M5 11.4C7 9.4 9.4 8.4 12 8.4C14.6 8.4 17 9.4 19 11.4L17 13.4C15.5 11.9 13.8 11.1 12 11.1C10.2 11.1 8.5 11.9 7 13.4Z"/>
    <path d="M2 8.4C4.7 5.7 8.2 4 12 4C15.8 4 19.3 5.7 22 8.4L20 10.4C17.8 8.3 15 7 12 7C9 7 6.2 8.3 4 10.4Z"/>
  </symbol>

  <!-- LINE-style smile (yellow) -->
  <symbol id="i-smile" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="#FFCC32"/>
    <circle cx="9" cy="10.2" r="1.4" fill="#3A2A1A"/>
    <circle cx="15" cy="10.2" r="1.4" fill="#3A2A1A"/>
    <path d="M7.5 14C8.5 16.2 10.1 17.3 12 17.3C13.9 17.3 15.5 16.2 16.5 14" fill="none" stroke="#3A2A1A" stroke-width="1.6" stroke-linecap="round"/>
  </symbol>
</svg>
